<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="dots" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(244,241,234,0.08)" />
    </pattern>
    <pattern id="chain" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M0 28 L28 0 L56 28 L28 56 Z" fill="none" stroke="rgba(244,241,234,0.06)" stroke-width="1.5" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a" />
  <rect width="1200" height="630" fill="url(#chain)" />
  <rect width="1200" height="630" fill="url(#dots)" />

  <!-- Top-right: London, UK badge — balances the left-aligned headline -->
  <g transform="translate(950, 48)">
    <rect x="0" y="0" width="200" height="52" fill="#ffcc00" stroke="#0a0a0a" stroke-width="3" />
    <text x="100" y="34" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="17" fill="#0a0a0a" letter-spacing="4" font-weight="700">LONDON, UK</text>
  </g>

  <!-- Main headline — SKATE / DAT WAY. with italic acid DAT and explicit
       dx gap so the italic T's overhang doesn't collide with WAY. -->
  <g transform="translate(80, 262)">
    <text font-family="Impact, 'Arial Narrow', sans-serif" font-size="220" fill="#f4f1ea" letter-spacing="-6">SKATE</text>
  </g>
  <g transform="translate(80, 445)">
    <text font-family="Impact, 'Arial Narrow', sans-serif" font-size="220" fill="#f4f1ea" letter-spacing="-6"><tspan fill="#d6ff3e" font-style="italic">DAT</tspan><tspan dx="56">WAY.</tspan></text>
  </g>

  <!-- Footer strip — EDITS · SPOTS · JOURNAL on the left, ★ 2026 on the right -->
  <line x1="0" y1="540" x2="1200" y2="540" stroke="rgba(244,241,234,0.15)" stroke-width="2" />
  <text x="80" y="585" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="14" fill="rgba(244,241,234,0.55)" letter-spacing="4" font-weight="600">MANIFESTO · REELS · MAP · JOURNAL · CONTACT</text>
  <text x="1120" y="585" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="14" fill="rgba(214,255,62,0.85)" text-anchor="end" letter-spacing="4" font-weight="700">★ 2026</text>
</svg>
